name: Naptan Download and Parse Data

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Naptan
        run: |
          python naptan.py
          find data/naptan -maxdepth 1 -type f -regex './naptan_[0-9]\{3\}\.json' -delete
          find data/naptan -maxdepth 1 -type f -regex './naptan_[0-9]\{3\}\.xml' -delete

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
            target-folder: data/
            folder: data
            commit-message: "Update resources from ${{ github.run_number }}:${{ github.run_attempt }}"
            branch: gh-pages
            clean: false